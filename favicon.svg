(() => {
  const body = document.body;
  const menuButton = document.querySelector('.menu-button');
  const mobileMenu = document.getElementById('mobile-menu');
  const progress = document.querySelector('.scroll-progress span');
  const terminal = document.getElementById('terminal');
  const terminalToggle = document.querySelector('.terminal-toggle');
  const terminalForm = document.getElementById('terminal-form');
  const terminalInput = document.getElementById('terminal-input');
  const terminalOutput = document.getElementById('terminal-output');
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  document.getElementById('year').textContent = String(new Date().getFullYear());

  const setMenu = (open) => {
    if (!menuButton || !mobileMenu) return;
    menuButton.setAttribute('aria-expanded', String(open));
    menuButton.setAttribute('aria-label', open ? 'Close navigation' : 'Open navigation');
    mobileMenu.classList.toggle('is-open', open);
    mobileMenu.setAttribute('aria-hidden', String(!open));
    body.classList.toggle('menu-open', open);
  };

  menuButton?.addEventListener('click', () => setMenu(menuButton.getAttribute('aria-expanded') !== 'true'));
  mobileMenu?.querySelectorAll('a').forEach((link) => link.addEventListener('click', () => setMenu(false)));
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') setMenu(false);
  });

  const updateProgress = () => {
    const max = document.documentElement.scrollHeight - window.innerHeight;
    const value = max > 0 ? (window.scrollY / max) * 100 : 0;
    if (progress) progress.style.width = `${Math.min(100, Math.max(0, value))}%`;
  };
  updateProgress();
  window.addEventListener('scroll', updateProgress, { passive: true });

  const revealElements = document.querySelectorAll('.reveal');
  const projectCards = document.querySelectorAll('.project-card');
  if ('IntersectionObserver' in window && !reducedMotion) {
    const revealObserver = new IntersectionObserver((entries, observer) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -5% 0px' });
    revealElements.forEach((element) => revealObserver.observe(element));

    const projectObserver = new IntersectionObserver((entries, observer) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('in-view');
        observer.unobserve(entry.target);
      });
    }, { threshold: 0.28 });
    projectCards.forEach((card) => projectObserver.observe(card));
  } else {
    revealElements.forEach((element) => element.classList.add('is-visible'));
    projectCards.forEach((card) => card.classList.add('in-view'));
  }

  terminalToggle?.addEventListener('click', () => {
    if (!terminal) return;
    const collapsed = terminal.classList.toggle('is-collapsed');
    terminalToggle.setAttribute('aria-expanded', String(!collapsed));
    if (!collapsed) window.setTimeout(() => terminalInput?.focus(), 250);
  });

  const commands = {
    help: 'projects — selected work\nresume — open résumé\nbike — e-bike development\nabout — background\ncontact — get in touch\nclear — clear terminal',
    projects: 'Jack Cadman Campaign Website\nBilliards Tournament Manager\nCustom Electric Bicycle\nCommon Ground (early prototype)',
    bike: 'Current focus: 52V architecture, 20–25Ah battery packaging, enclosure design, component tradeoffs, and future telemetry.',
    about: 'Incoming Northeastern CS student with a URI computer-engineering foundation. Interested in product engineering, startups, embedded systems, and ambitious technical work.',
    contact: 'Email: tjblech@gmail.com\nGitHub: github.com/tjblech\nLinkedIn: TJ Blechman',
    resume: 'Opening résumé…'
  };

  const appendOutput = (text, className = 'terminal-response') => {
    if (!terminalOutput) return;
    const paragraph = document.createElement('p');
    paragraph.className = className;
    paragraph.textContent = text;
    terminalOutput.appendChild(paragraph);
    terminalOutput.scrollTop = terminalOutput.scrollHeight;
  };

  terminalForm?.addEventListener('submit', (event) => {
    event.preventDefault();
    if (!terminalInput || !terminalOutput) return;
    const command = terminalInput.value.trim().toLowerCase();
    if (!command) return;

    const line = document.createElement('p');
    const prompt = document.createElement('span');
    prompt.className = 'prompt';
    prompt.textContent = 'tj@workbench:~$ ';
    line.append(prompt, document.createTextNode(command));
    terminalOutput.appendChild(line);

    if (command === 'clear') {
      terminalOutput.innerHTML = '';
    } else if (commands[command]) {
      appendOutput(commands[command]);
      if (command === 'resume') window.setTimeout(() => { window.location.href = 'resume.html'; }, 450);
    } else {
      appendOutput(`Command not found: ${command}. Type “help”.`, 'terminal-error');
    }

    terminalInput.value = '';
    terminalOutput.scrollTop = terminalOutput.scrollHeight;
  });
})();
